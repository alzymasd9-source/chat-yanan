<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head><meta charset="UTF-8"><title>الاصدقاء</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-900 text-white p-6">
<h1>👥 الاصدقاء</h1>
<a href="/room.html" class="text-blue-400">الرجوع للغرفة</a>

<div id="friendsList" class="grid grid-cols-3 gap-2 mt-4"></div>

<h2 class="mt-6">📝 الحائط</h2>
<textarea id="wallText" class="text-black w-full p-2 rounded" placeholder="اكتب على حائطك"></textarea>
<button onclick="postWall()" class="bg-blue-600 p-2 rounded mt-2">نشر</button>
<div id="wallPosts" class="mt-4 space-y-2"></div>

<script>
const user = JSON.parse(localStorage.getItem('user'));

fetch('/friends/'+user.username).then(r=>r.json()).then(data=>{
  friendsList.innerHTML = data.map(f=>`<div class="bg-gray-800 p-2 rounded">${f.user1==user.username?f.user2:f.user1}</div>`).join('');
});

fetch('/wall/'+user.username).then(r=>r.json()).then(data=>{
  wallPosts.innerHTML = data.map(p=>`<div class="bg-gray-800 p-2 rounded"><b>${p.author}:</b> ${p.text}</div>`).join('');
});

function postWall(){
  fetch('/wall/post',{method:'POST',headers:{'Content-Type':'application/json'},
  body: JSON.stringify({owner:user.username, author:user.username, text:wallText.value})
  }).then(()=>location.reload());
}
</script>
</body></html>
