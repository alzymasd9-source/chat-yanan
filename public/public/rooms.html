<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head><meta charset="UTF-8"><title>الغرف</title>
<link href="style.css" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-900 text-white">
<div class="container mx-auto p-6">
  <h1 class="text-2xl mb-6">اختر الغرفة</h1>
  <div class="grid grid-cols-2 gap-4">
    <button onclick="enter('العامة')" class="bg-blue-600 p-4 rounded">العامة<br><span>ادخل هنا</span></button>
    <button onclick="enter('اليمن')" class="bg-red-600 p-4 rounded">اليمن<br><span>ادخل هنا</span></button>
    <button onclick="enter('مصر')" class="bg-yellow-600 p-4 rounded">مصر<br><span>ادخل هنا</span></button>
    <button onclick="enter('الجزائر')" class="bg-green-600 p-4 rounded">الجزائر<br><span>ادخل هنا</span></button>
  </div>
</div>
<script>
function enter(room){
  let user = JSON.parse(localStorage.getItem('user'));
  user.room = room;
  localStorage.setItem('user', JSON.stringify(user));
  window.location = '/room.html';
}
</script>
</body></html>
