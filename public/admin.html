<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head><meta charset="UTF-8"><title>لوحة التحكم</title>
<script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-900 text-white p-6">
<h1 class="text-2xl mb-4">👑 لوحة التحكم</h1>
<a href="/room.html" class="text-blue-400">الرجوع للغرفة</a>

<div class="grid grid-cols-2 gap-4 mt-4">
  <div class="bg-gray-800 p-4 rounded">
    <h2>سجل الكتم والطرد</h2>
    <div id="logs" class="h-64 overflow-y-auto text-sm"></div>
  </div>
  <div class="bg-gray-800 p-4 rounded">
    <h2>البلاغات 📭</h2>
    <div id="reports" class="h-64 overflow-y-auto text-sm"></div>
  </div>
</div>

<div class="bg-gray-800 p-4 rounded mt-4">
  <h2>تعديل عضو</h2>
  <input id="targetUser" placeholder="اسم العضو" class="text-black p-2 rounded">
  <select id="newRank" class="text-black p-2 rounded">
    <option>عضو</option><option>مميز</option><option>مشرف</option><option>ادارة</option>
  </select>
  <button onclick="editUser()" class="bg-blue-600 p-2 rounded">تعديل</button>
</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
if(!['ادارة','ادمن','المالك'].includes(user.rank)) location.href='/';

function loadData(){
  fetch('/admin/logs').then(r=>r.json()).then(data=>{
    logs.innerHTML = data.map(l=>`<p>${new Date(l.date).toLocaleString('ar-EG')} - ${l.admin} ${l.action} ${l.target} ${l.duration?'لمدة '+l.duration+'د':''}</p>`).join('');
  });
  fetch('/admin/reports').then(r=>r.json()).then(data=>{
    reports.innerHTML = data.map(r=>`<p>${r.from} 📨 ${r.to} : ${r.reason}</p>`).join('');
  });
}
loadData();

function editUser(){
  fetch('/admin/editUser',{method:'POST',headers:{'Content-Type':'application/json'},
  body: JSON.stringify({admin: user.username, target: targetUser.value, data: {rank: newRank.value}})
  }).then(()=>{ alert('تم التعديل'); loadData(); })
}
</script>
</body></html>
