<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head><meta charset="UTF-8"><title>شات اليمن المطور</title>
<script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
<div class="bg-gray-800 p-8 rounded-xl w-96">
  <h1 class="text-2xl text-center mb-6">موقع شات اليمن المطور</h1>

  <h2 class="mb-2">دخول زوار 👤</h2>
  <input id="gname" placeholder="اكتب اسمك" class="text-black p-2 rounded w-full mb-2">
  <select id="ggender" class="text-black p-2 rounded w-full mb-2">
    <option value="blue">ذكر</option><option value="pink">أنثى</option><option value="white">آخر</option>
  </select>
  <button onclick="guestLogin()" class="bg-green-600 w-full p-2 rounded">دخول</button>

  <hr class="my-4">
  <h2 class="mb-2">دخول أعضاء</h2>
  <input id="luser" placeholder="اسم المستخدم" class="text-black p-2 rounded w-full mb-2">
  <input id="lpass" type="password" placeholder="كلمة السر" class="text-black p-2 rounded w-full mb-2">
  <button onclick="login()" class="bg-blue-600 w-full p-2 rounded">دخول</button>
</div>

<script>
function guestLogin(){
  let user = {
    username: document.getElementById('gname').value,
    gender: document.getElementById('ggender').value,
    age: Math.floor(Math.random() * 80) + 20,
    rank: 'زائر', coins: 0
  }
  localStorage.setItem('user', JSON.stringify(user));
  window.location = '/rooms.html';
}
async function login(){
  let res = await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({username:luser.value,password:lpass.value})});
  let user = await res.json();
  localStorage.setItem('user', JSON.stringify(user));
  window.location = '/rooms.html';
}
</script>
</body></html>
