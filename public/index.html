<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>شات اليمن العربي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Tajawal",tahoma}
body{background:#fff;overflow:hidden}

/* الشريط العلوي */
.topbar{background:#0a3d48;color:#fff;display:flex;justify-content:center;align-items:center;position:fixed;top:0;width:100%;z-index:100;height:44px;font-size:15px;letter-spacing:1px}

/* منطقة الشات */
.chat-area{padding:44px 0 105px 0;height:100vh;overflow-y:auto;background:#fff}

/* شريط الارسال */
.input-bar{position:fixed;bottom:50px;width:100%;background:#f2f2f2;display:flex;align-items:center;padding:8px 12px;gap:8px}
.input-bar input{flex:1;padding:10px 18px;border-radius:25px;border:1px solid #ddd;outline:none;font-size:15px;background:#fff;text-align:right;color:#333}
.input-bar input::placeholder{color:#999}

/* الشريط السفلي */
.bottom-nav{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-around;align-items:center;padding:8px 0;border-top:1px solid #e0e0e0;height:50px}
.bottom-nav div{text-align:center;font-size:13px;color:#777;cursor:pointer}
.bottom-nav i{display:none} /* مخفي مثل الصورة */

/* شاشة الدخول */
#login_page{background:#0a3d48;min-height:100vh;color:#fff;text-align:center;padding-top:100px}
#login_page h1{font-size:24px;margin-bottom:30px}
.login-box{background:#fff;color:#000;width:90%;max-width:330px;margin:auto;padding:20px;border-radius:8px}
.login-box input{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:5px;font-size:16px;text-align:center}
.login-box button{width:100%;padding:12px;background:#5cb85c;color:#fff;border:none;border-radius:5px;font-size:17px;margin-top:10px;cursor:pointer}
.gendiv{display:flex;justify-content:space-around;margin:10px 0;color:#000;font-size:15px}
#chat_app{display:none}
</style>
</head>
<body>

<div id="login_page">
  <h1>شات اليمن العربي</h1>
  <div class="login-box" id="guest_box">
    <h3>دخول الزوار</h3>
    <input type="text" id="guest_username" placeholder="الإسم المستعار">
    <div class="gendiv">
      <label><input type="radio" name="g" value="male" checked> ذكر</label>
      <label><input type="radio" name="g" value="female"> أنثى</label>
    </div>
    <button id="guest_btn">دخول</button>
    <button onclick="showMember()" style="background:#0a3d48">دخول الاعضاء</button>
  </div>

  <div class="login-box" id="member_box" style="display:none">
    <h3>دخول الاعضاء</h3>
    <input type="text" id="member_username" placeholder="الإسم المستعار">
    <input type="password" id="member_password" placeholder="كلمة المرور">
    <button id="member_btn">دخول</button>
    <button onclick="register()">تسجيل جديد</button>
    <button onclick="showGuest()" style="background:#ccc;color:#000">رجوع</button>
  </div>
</div>

<div id="chat_app">
  <div class="topbar">Store</div>

  <div class="chat-area" id="messages_box"></div>

  <form class="input-bar" id="chat_form">
    <input type="text" id="msg_input" placeholder="اكتب هنا...">
  </form>

  <div class="bottom-nav">
    <div>مذيعة</div>
    <div>اعضاء</div>
    <div style="color:#0a3d48;font-weight:700">الغرف</div>
    <div>خيارات</div>
    <div>الملف</div>
  </div>
</div>

<script
