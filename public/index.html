<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات اليمن المطور</title>
<style>
:root{--green:#075e54;--light:#dcf8c6}
body{margin:0;font-family:tahoma;background:#f0f0f0;overflow:hidden}
.header{background:var(--green);color:#fff;padding:10px 15px;position:fixed;width:100%;z-index:10}
#wrap{display:flex;height:100vh;padding-top:55px}
#sidebar{width:280px;background:#fff;border-left:1px solid #ddd}
#users_list{padding:10px}
.user-item{padding:8px;cursor:pointer}
.user-item:hover{background:#f5f5f5}
#chat_area{flex:1;display:flex;flex-direction:column}
#messages{flex:1;overflow:auto;padding:10px;background:#e5ddd5}
.msg{background:#fff;padding:8px 12px;border-radius:7px;margin:5px 0;max-width:70%}
.msg.me{background:var(--light);margin-right:auto}
#chat-input{padding:10px;background:#f0f0f0;display:flex;gap:10px}
#msg_input{flex:1;padding:10px;border-radius:20px;border:1px solid #ddd}
.btn{background:var(--green);color:#fff;border:none;padding:10px 15px;border-radius:20px;cursor:pointer}
#roomid{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:999;display:flex;align-items:center;justify-content:center}
.hide{display:none}
</style></head><body>
<div class="header"><b>شات اليمن المطور</b></div>
<div id="wrap">
  <div id="sidebar"><div id="users_list"></div></div>
  <div id="chat_area">
    <div id="messages"></div>
    <div id="chat-input">
      <input id="msg_input" placeholder="اكتب رسالتك...">
      <button class="btn" type="button" id="send_btn">ارسال</button>
    </div>
  </div>
</div>

<div id="roomid">
  <div>
    <h3>أهلاً بك في شات اليمن المطور</h3>
    <input id="name_input" placeholder="اسمك">
    <button class="btn" type="button" id="guest_btn">دخول</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const $=id=>document.getElementById(id);
const socket=io();
let myId;

console.log("السكربت اشتغل");

$('guest_btn').onclick=function(){
  const name=$('name_input').value.trim(); 
  if(!name){alert('دخل اسمك'); return;} 
  socket.emit('join',{name:name,gender:'male'}); 
  $('roomid').classList.add('hide');
  console.log("تم ارسال join");
}

$('send_btn').onclick=function(){send()};
$('msg_input').onkeypress=function(e){if(e.key==='Enter'){e.preventDefault(); send()}};

function send(){
  let txt=$('msg_input').value.trim();
  if(!txt)return;
  socket.emit('message',{type:'text',content:txt}); 
  $('msg_input').value='';
}

socket.on('connect',()=>console.log("متصل بالسيرفر"));
socket.on('you are',d=>{myId=d.id;});

socket.on('message',d=>{
  const div=document.createElement('div');
  div.className='msg '+(d.user.id===myId?'me':'');
  div.innerHTML=`<b>${d.user.name}</b><br>${d.content}`;
  $('messages').appendChild(div);
  $('messages').scrollTop=$('messages').scrollHeight;
})

socket.on('users list',list=>{
  $('users_list').innerHTML='';
  list.forEach(u=>{
    $('users_list').innerHTML+=`<div class="user-item">${u.name}</div>`;
  });
})
</script>
</body></html>
