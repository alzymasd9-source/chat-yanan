<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات اليمن</title>
<style>
body{margin:0;font-family:tahoma;background:#f0f0f0}
.header{background:#075e54;color:#fff;padding:10px;text-align:center}
#roomid{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center}
#chat{display:none;padding:10px}
#messages{height:400px;overflow:auto;background:#fff;margin:10px 0;padding:10px}
.btn{background:#075e54;color:#fff;border:none;padding:10px 20px;border-radius:5px;cursor:pointer}
</style>
</head>
<body>
<div class="header">شات اليمن المطور</div>

<div id="roomid">
  <div>
    <h3>أهلاً بك</h3>
    <input id="name" placeholder="اسمك">
    <button class="btn" id="join">دخول</button>
  </div>
</div>

<div id="chat">
  <div id="messages"></div>
  <input id="msg" placeholder="اكتب">
  <button class="btn" id="send">ارسال</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
document.getElementById('join').onclick = () => {
  const name = document.getElementById('name').value;
  if(!name) return alert('دخل اسمك');
  socket.emit('join', {name});
  document.getElementById('roomid').style.display = 'none';
  document.getElementById('chat').style.display = 'block';
}
document.getElementById('send').onclick = () => {
  const txt = document.getElementById('msg').value;
  if(!txt) return;
  socket.emit('message', {type:'text', content:txt});
  document.getElementById('msg').value = '';
}
socket.on('message', d => {
  document.getElementById('messages').innerHTML += `<b>${d.user.name}:</b> ${d.content}<br>`;
})
</script>
</body>
</html>
