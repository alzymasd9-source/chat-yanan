<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>شات اليمن العربي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Tajawal",tahoma}
body{background:#fff}

/* الهيدر */
.topbar{background:#0f414e;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:0 10px;position:fixed;top:0;width:100%;z-index:100;height:50px}
.topbar .fa-bars{font-size:22px}
.topbar .icons{display:flex;gap:18px;font-size:20px;align-items:center}
.topbar .icons div{text-align:center;font-size:10px}
.topbar .avatar{width:38px;height:38px;border-radius:50%;background:#ccc}

/* الشات */
.chat-area{padding:55px 10px 115px 10px;min-height:100vh;background:#fff}
.msg-row{display:flex;gap:10px;margin:12px 0;align-items:flex-start;flex-direction:row-reverse}
.avatar{width:45px;height:45px;border-radius:50%;background:#ddd;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.msg{flex:1;text-align:right}
.msg .top{display:flex;justify-content:space-between;margin-bottom:3px;flex-direction:row-reverse}
.msg .name{color:#0066cc;font-weight:700;font-size:14px}
.msg .name span{color:#666;font-weight:400;font-size:13px}
.msg .time{color:#999;font-size:12px}
.msg .content{color:#333;font-size:15px;line-height:1.5}

/* شريط الارسال */
.input-bar{position:fixed;bottom:50px;width:100%;background:#f5f5f5;display:flex;align-items:center;padding:8px 10px;gap:8px;border-top:1px solid #ddd}
.input-bar .btn{width:40px;height:40px;border-radius:50%;background:transparent;color:#555;border:none;font-size:22px;display:grid;place-items:center;cursor:pointer}
.input-bar input{flex:1;padding:10px 18px;border-radius:25px;border:1px solid #ccc;outline:none;font-size:15px;background:#fff;text-align:right}
#sendBtn{background:#0f414e;color:#fff}

/* الشريط السفلي */
.bottom-nav{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-around;align-items:center;padding:5px 0;border-top:1px solid #ddd;height:50px}
.bottom-nav div{text-align:center;font-size:11px;color:#555;cursor:pointer}
.bottom-nav i{font-size:20px;display:block;margin-bottom:2px}
.bottom-nav .active{color:#0f414e}

/* الدخول */
#login_page{background:#0f414e;min-height:100vh;color:#fff;text-align:center;padding-top:80px}
.login-box{background:#fff;color:#000;width:90%;max-width:340px;margin:auto;padding:20px;border-radius:10px}
.login-box input{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:5px;font-size:16px;text-align:center}
.login-box button{width:100%;padding:12px;background:#5cb85c;color:#fff;border:none;border-radius:5px;font-size:17px;margin-top:10px;cursor:pointer}
.gendiv{display:flex;justify-content:space-around;margin:10px 0;color:#000}
#chat_app{display:none}
</style>
</head>
<body>

<div id="login_page">
  <h1>شات اليمن العربي</h1>
  <div class="login-box" id="guest_box">
    <h3>دخول الزوار</h3>
    <input type="text" id="guest_username" placeholder="الإسم المستعار">
    <div class="gendiv">
      <label><input type="radio" name="g" value="male" checked> ذكر</label>
      <label><input type="radio" name="g" value="female"> أنثى</label>
    </div>
    <button id="guest_btn">دخول</button>
    <button id="show_member_btn" style="background:#0f414e">دخول الاعضاء</button>
  </div>

  <div class="login-box" id="member_box" style="display:none">
    <h3>دخول الاعضاء</h3>
    <input type="text" id="member_username" placeholder="الإسم المستعار">
    <input type="password" id="member_password" placeholder="كلمة المرور">
    <button id="member_btn">دخول</button>
    <button id="register_btn">تسجيل جديد</button>
    <button id="show_guest_btn" style="background:#ccc;color:#000">رجوع</button>
  </div>
</div>

<div id="chat_app">
  <div class="topbar">
    <i class="fa fa-bars"></i>
    <div class="icons">
      <div><i class="fa fa-store"></i><div>Store</div></div>
      <div><i class="fa fa-envelope"></i></div>
      <div><i class="fa fa-user-plus"></i></div>
      <div><i class="fa fa-heart"></i></div>
    </div>
    <div class="avatar"></div>
  </div>

  <div class="chat-area" id="messages_box"></div>

  <form class="input-bar" id="chat_form">
    <button type="button" class="btn"><i class="fa fa-plus"></i></button>
    <button type="button" class="btn"><i class="fa fa-smile"></i></button>
    <input type="text" id="msg_input" placeholder="اكتب هنا...">
    <button type="button" class="btn"><i class="fa fa-microphone"></i></button>
    <button type="submit" class="btn" id="sendBtn"><i class="fa fa-paper-plane"></i></button>
  </form>

  <div class="bottom-nav">
    <div><i class="fa fa-users"></i>المتواجدين</div>
    <div><i class="fa fa-home"></i>الغرف</div>
    <div><i class="fa fa-cog"></i>خيارات</div>
    <div><i class="fa fa-user"></i>المستخدم</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io("https://chat-yanan-1.onrender.com");
const $ = id => document.getElementById(id);
let me = {};

$('show_member_btn').onclick = ()=>{ $('guest_box').style.display='none'; $('member_box').style.display='block'; }
$('show_guest_btn').onclick = ()=>{ $('member_box').style.display='none'; $('guest_box').style.display='block'; }

$('guest_btn').onclick = () => {
  let name = $('guest_username').value.trim();
  if(name) socket.emit('guest',{name});
  else alert('ادخل اسم');
}
$('member_btn').onclick = () => {
  socket.emit('login',{name:$('member_username').value,password:$('member_password').value});
}
$('register_btn').onclick = ()=>{
  socket.emit('register',{name:$('member_username').value,password:$('member_password').value,gender:'male'});
}

socket.on('login_ok',u=>{
  me=u;
  $('login_page').style.display='none';
  $('chat_app').style.display='block';
  socket.emit('join',{name:u.name,room:'main'});
});

socket.on('error_msg',msg=>{ alert(msg); });
socket.on('register_ok',msg=>{ alert(msg); $('show_guest_btn').click(); });

function getTime(){
  let d = new Date();
  let h = d.getHours();
  let m = d.getMinutes();
  let ampm = h >= 12 ? 'م' : 'ص';
  h = h % 12; h = h ? h : 12;
  m = m < 10 ? '0'+m : m;
  return `${h}:${m} ${ampm}`;
}

socket.on('chat_message',d=>{
  let time = d.time || getTime();
  $('messages_box').innerHTML += `
  <div class="msg-row">
    <div class="avatar"><img src="https://ui-avatars.com/api/?name=${encodeURIComponent(d.from)}&background=5cb85c&color=fff&size=128"></div>
    <div class="msg">
      <div class="top">
        <div class="time">${time}</div>
        <div class="name">${d.from} <span>[${d.rank||'guest'}]</span></div>
      </div>
      <div class="content">${d.content}</div>
    </div>
  </div>`;
  $('messages_box').scrollTop = $('messages_box').scrollHeight;
});

$('chat_form').onsubmit = e => {
  e.preventDefault();
  let val = $('msg_input').value.trim();
  if(val=='')return;
  socket.emit('chat_message',{room:'main',content:val});
  $('msg_input').value='';
};
</script>
</body>
</html>
