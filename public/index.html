<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>شات اليمن العربي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Tajawal",tahoma}
body{background:#e9e9e9}

/* 1. الشريط العلوي */
.topbar{background:#0f414e;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:0 10px;position:fixed;top:0;width:100%;z-index:100;height:50px}
.topbar .fa-bars{font-size:22px}
.topbar .icons{display:flex;gap:18px;font-size:20px}
.topbar .icons i{cursor:pointer}
.topbar .icons span{font-size:10px;display:block;text-align:center}
.topbar .avatar{width:35px;height:35px;border-radius:50%;background:url(https://i.imgur.com/1pYBCwI.png) center/cover}

/* 2. منطقة الشات */
.chat-area{padding:60px 0 120px 0;min-height:100vh;background:#fff}
.msg-row{display:flex;margin:10px;align-items:flex-start;gap:8px}
.msg{flex:1;background:transparent}
.msg .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.msg .name{font-size:14px;font-weight:700;color:#0066cc}
.msg .time{font-size:12px;color:#999}
.msg .content{font-size:15px;color:#333;line-height:1.6}
.avatar{width:40px;height:40px;border-radius:50%;background:#ddd;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}

/* 3. شريط الارسال */
.input-bar{position:fixed;bottom:50px;width:100%;background:#f5f5f5;display:flex;align-items:center;padding:8px 5px;gap:5px;border-top:1px solid #ddd}
.input-bar input{flex:1;padding:10px 15px;border-radius:25px;border:1px solid #ddd;outline:none;font-size:16px;background:#fff}
.input-bar .btn{width:40px;height:40px;border-radius:50%;background:transparent;color:#555;border:none;font-size:22px;display:grid;place-items:center;cursor:pointer}
#sendBtn{background:#0f414e;color:#fff}

/* 4. الشريط السفلي */
.bottom-nav{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-around;padding:6px 0;border-top:1px solid #ddd;height:50px}
.bottom-nav div{text-align:center;font-size:11px;color:#555;cursor:pointer}
.bottom-nav i{font-size:20px;display:block;margin-bottom:3px}
.bottom-nav .active{color:#0f414e}

/* 5. شاشة الدخول */
#login_page{background:#0f414e;min-height:100vh;color:#fff;text-align:center;padding-top:80px}
#login_page h1{font-size:26px;margin-bottom:30px}
.login-box{background:#fff;color:#000;width:90%;max-width:340px;margin:auto;padding:20px;border-radius:10px}
.login-box input{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:5px;font-size:16px;text-align:center}
.login-box button{width:100%;padding:12px;background:#74b20e;color:#fff;border:none;border-radius:5px;font-size:18px;margin-top:10px;cursor:pointer}
.gendiv{display:flex;justify-content:space-around;margin:10px 0}
#chat_app{display:none}
</style>
</head>
<body>

<div id="login_page">
  <h1>شات اليمن العربي</h1>
  <div class="login-box" id="guest_box">
    <h3>دخول الزوار</h3>
    <input type="text" id="guest_username" placeholder="الإسم المستعار">
    <div class="gendiv">
      <label><input type="radio" name="g" value="male" checked> ذكر</label>
      <label><input type="radio" name="g" value="female"> أنثى</label>
    </div>
    <button id="guest_btn">دخول</button>
    <button onclick="showMember()" style="background:#0f414e">دخول الاعضاء</button>
  </div>
  
  <div class="login-box" id="member_box" style="display:none">
    <h3>دخول الاعضاء</h3>
    <input type="text" id="member_username" placeholder="الإسم المستعار">
    <input type="password" id="member_password" placeholder="كلمة المرور">
    <button id="member_btn">دخول</button>
    <button onclick="register()">تسجيل جديد</button>
    <button onclick="showGuest()" style="background:#ccc;color:#000">رجوع</button>
  </div>
</div>

<div id="chat_app">
  <div class="topbar">
    <i class="fa fa-bars"></i>
    <div class="icons">
      <div><i class="fa fa-store"></i><span>Store</span></div>
      <div><i class="fa fa-envelope"></i></div>
      <div><i class="fa fa-user-plus"></i></div>
      <div><i class="fa fa-heart"></i></div>
    </div>
    <div class="avatar"></div>
  </div>

  <div class="chat-area" id="messages_box"></div>

  <form class="input-bar" id="chat_form">
    <button type="button" class="btn"><i class="fa fa-plus"></i></button>
    <button type="button" class="btn"><i class="fa fa-smile"></i></button>
    <input type="text" id="msg_input" placeholder="اكتب هنا...">
    <button type="button" class="btn"><i class="fa fa-microphone"></i></button>
    <button type="submit" class="btn" id="sendBtn"><i class="fa fa-paper-plane"></i></button>
  </form>

  <div class="bottom-nav">
    <div><i class="fa fa-volume-up"></i>مذيعة</div>
    <div><i class="fa fa-users"></i>اعضاء</div>
    <div class="active"><i class="fa fa-home"></i>الغرف</div>
    <div><i class="fa fa-cog"></i>خيارات</div>
    <div><i class="fa fa-user"></i>الملف</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io("https://chat-yanan-1.onrender.com");
const $ = id => document.getElementById(id);
let me = {};

function showMember(){ $('guest_box').style.display='none'; $('member_box').style.display='block'; }
function showGuest(){ $('member_box').style.display='none'; $('guest_box').style.display='block'; }

$('guest_btn').onclick = () => {
  let name = $('guest_username').value.trim();
  if(name) socket.emit('guest',{name});
  else alert('ادخل اسم');
}
$('member_btn').onclick = () => {
  socket.emit('login',{name:$('member_username').value,password:$('member_password').value});
}
function register(){ 
  let name = $('member_username').value.trim();
  let pass = $('member_password').value.trim();
  if(name && pass) socket.emit('register',{name,password:pass,gender:'male'});
  else alert('ادخل البيانات');
}

socket.on('login_ok',u=>{
  me=u;
  $('login_page').style.display='none';
  $('chat_app').style.display='block';
  socket.emit('join',{name:u.name,room:'main'});
});

socket.on('error_msg',msg=>{ alert(msg); });

socket.on('chat_message',d=>{
  $('messages_box').innerHTML += `
  <div class="msg-row">
    <div class="avatar"><img src="https://ui-avatars.com/api/?name=${d.from}&background=74b20e&color=fff"></div>
    <div class="msg">
      <div class="header">
        <div class="name">${d.rank? '['+d.rank+'] ':''}${d.from}</div>
        <div class="time">${d.time}</div>
      </div>
      <div class="content">${d.content}</div>
    </div>
  </div>`;
  $('messages_box').scrollTop = $('messages_box').scrollHeight;
});

$('chat_form').onsubmit = e => { 
  e.preventDefault(); 
  if($('msg_input').value.trim()=='')return; 
  socket.emit('chat_message',{room:'main',content:$('msg_input').value}); 
  $('msg_input').value=''; 
};
</script>
</body>
</html>
