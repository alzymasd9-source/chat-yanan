<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شات اليمن المطور</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --green: #075e54;
      --dark-green: #0f414e;
      --light-green: #128c7e;
      --blue: #2196F3;
      --pink: #E91E63;
      --gray: #9E9E9E;
      --dark: #2a2a2a;
      --light: #f5f5f5;
    }

    * {
      box-sizing: border-box;
      font-family: 'Tajawal', tahoma;
      margin: 0;
      padding: 0;
    }

    body {
      background: #e5ddd5;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== MAIN MENU ===== */
    .main-menu {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      gap: 20px;
      flex-wrap: wrap;
      background: linear-gradient(135deg, #075e54, #128c7e);
      padding: 20px;
    }

    .main-menu h1 {
      position: absolute;
      top: 40px;
      color: white;
      font-size: 32px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .menu-btn {
      background: white;
      color: var(--dark-green);
      border: none;
      padding: 20px 40px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .menu-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    /* ===== POPUPS ===== */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .popup.show {
      display: flex;
    }

    .popup-box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .popup-box h3 {
      color: var(--dark-green);
      margin-bottom: 20px;
      font-size: 20px;
    }

    .close-popup {
      float: left;
      font-size: 28px;
      cursor: pointer;
      color: #999;
      transition: color 0.3s;
    }

    .close-popup:hover {
      color: #333;
    }

    .input-group {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 8px 0;
    }

    .popup-box input,
    .popup-box textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin: 8px 0;
      font-family: 'Tajawal', tahoma;
    }

    .popup-box input:focus,
    .popup-box textarea:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 5px rgba(7, 94, 84, 0.3);
    }

    .btn-main {
      background: var(--green);
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .btn-main:hover {
      background: var(--light-green);
    }

    .btn-secondary {
      background: var(--gray);
      color: white;
      border: none;
      padding: 10px;
      width: 48%;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
      display: inline-block;
    }

    .gender-dropdown {
      position: relative;
      flex: 1;
    }

    .gender-btn {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      background: white;
      width: 100%;
      text-align: right;
    }

    .gender-options {
      position: absolute;
      top: 100%;
      left: 0;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      display: none;
      z-index: 10;
      width: 100%;
      margin-top: 5px;
    }

    .gender-options.show {
      display: block;
    }

    .gender-option {
      padding: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .gender-option:hover {
      background: var(--light);
    }

    /* ===== CHAT INTERFACE ===== */
    #chatArea {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    #chatArea.show {
      display: flex;
    }

    /* ===== TOP BAR ===== */
    .topbar {
      height: 60px;
      background: var(--dark-green);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .topbar .left,
    .topbar .right {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .topbar button {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .topbar button:hover {
      transform: scale(1.1);
    }

    .topbar .room-name {
      font-weight: bold;
      font-size: 18px;
      margin: 0 20px;
    }

    .topbar .online-count {
      background: rgba(255,255,255,0.2);
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* ===== CHAT BODY ===== */
    .chat-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: white;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin: 10px 0;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      background: linear-gradient(135deg, #075e54, #128c7e);
      flex-shrink: 0;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .msg-content {
      flex: 1;
      background: #f0f0f0;
      padding: 10px 12px;
      border-radius: 12px;
      border-left: 3px solid var(--green);
    }

    .msg-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .msg-name {
      font-weight: bold;
      color: var(--green);
      font-size: 14px;
    }

    .msg-rank {
      font-size: 11px;
      background: #e0f2f1;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 5px;
    }

    .msg-time {
      color: #999;
      font-size: 11px;
    }

    .msg-text {
      color: #333;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .msg-image {
      max-width: 200px;
      border-radius: 8px;
      margin-top: 5px;
    }

    .system-msg {
      text-align: center;
      color: #999;
      font-size: 13px;
      margin: 10px 0;
      font-style: italic;
      background: #f9f9f9;
      padding: 8px;
      border-radius: 8px;
    }

    /* ===== INPUT AREA ===== */
    .input-area {
      height: 70px;
      background: var(--light);
      display: flex;
      align-items: center;
      padding: 10px 15px;
      gap: 10px;
      border-top: 1px solid #ddd;
    }

    .input-area button {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--dark-green);
      transition: transform 0.2s;
    }

    .input-area button:hover {
      transform: scale(1.2);
    }

    .input-area input {
      flex: 1;
      padding: 12px 18px;
      border-radius: 25px;
      border: 1px solid #ddd;
      outline: none;
      font-size: 15px;
      background: white;
      text-align: right;
    }

    .input-area input:focus {
      border-color: var(--green);
      box-shadow: 0 0 5px rgba(7, 94, 84, 0.3);
    }

    #sendBtn {
      background: var(--green);
      color: white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== BOTTOM NAV ===== */
    .bottombar {
      height: 60px;
      background: white;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid #ddd;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
    }

    .bottombar button {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      color: #555;
      font-size: 12px;
      transition: color 0.3s;
      padding: 5px 10px;
    }

    .bottombar button i {
      font-size: 20px;
    }

    .bottombar button.active {
      color: var(--dark-green);
    }

    .bottombar button:hover {
      color: var(--dark-green);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: fixed;
      top: 60px;
      right: -300px;
      width: 300px;
      height: calc(100% - 60px);
      background: white;
      transition: right 0.3s ease;
      z-index: 99;
      padding: 15px;
      overflow-y: auto;
      box-shadow: -2px 0 5px rgba(0,0,0,0.1);
    }

    .sidebar.open {
      right: 0;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--light);
    }

    .sidebar-header h3 {
      color: var(--dark-green);
    }

    .sidebar-header .close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }

    .users-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .user-item:hover {
      background: var(--light);
    }

    .user-item .avatar-small {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: var(--green);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
    }

    .user-info {
      flex: 1;
      text-align: right;
    }

    .user-name {
      font-weight: bold;
      color: #333;
      font-size: 13px;
    }

    .user-rank {
      font-size: 11px;
      color: var(--green);
    }

    .user-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
    }

    .rooms-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .room-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: var(--light);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .room-item:hover {
      background: #e0f2f1;
      border-left-color: var(--green);
    }

    .room-item.active {
      background: #e0f2f1;
      border-left-color: var(--green);
    }

    .room-item i {
      font-size: 18px;
      color: var(--green);
    }

    .room-item-name {
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    /* ===== PROFILE MODAL ===== */
    .profile-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .profile-modal.show {
      display: flex;
    }

    .profile-box {
      background: white;
      width: 90%;
      max-width: 500px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: slideUp 0.3s ease;
    }

    .profile-cover {
      height: 150px;
      background: linear-gradient(135deg, #075e54, #128c7e);
      position: relative;
    }

    .profile-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: white;
      position: absolute;
      bottom: -40px;
      right: 20px;
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 24px;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-header {
      padding: 50px 20px 20px;
      text-align: right;
    }

    .profile-name {
      font-size: 20px;
      font-weight: bold;
      color: #333;
    }

    .profile-rank {
      font-size: 14px;
      color: var(--green);
      margin-top: 5px;
    }

    .profile-tabs {
      display: flex;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
    }

    .profile-tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: #666;
      font-weight: 500;
      transition: all 0.2s;
    }

    .profile-tab.active {
      border-bottom-color: var(--green);
      color: var(--dark-green);
    }

    .profile-content {
      padding: 20px;
      display: none;
    }

    .profile-content.active {
      display: block;
    }

    .profile-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .profile-info-label {
      color: #666;
      font-size: 13px;
    }

    .profile-info-value {
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .profile-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .profile-actions button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .profile-actions .btn-primary {
      background: var(--green);
      color: white;
    }

    .profile-actions .btn-secondary {
      background: var(--light);
      color: #333;
      border: 1px solid #ddd;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .main-menu {
        flex-direction: column;
        gap: 15px;
      }

      .menu-btn {
        width: 90%;
      }

      .sidebar {
        width: 100%;
        right: -100%;
      }

      .popup-box {
        width: 95%;
      }

      .profile-box {
        width: 95%;
      }
    }

    .hide {
      display: none !important;
    }
  </style>
</head>
<body>

<!-- ===== MAIN MENU ===== -->
<div class="main-menu" id="mainMenu">
  <h1>🇾🇪 شات اليمن المطور</h1>
  <button class="menu-btn" onclick="showPopup('guest')">🤖 دخول زائر</button>
  <button class="menu-btn" onclick="showPopup('login')">👤 دخول الأعضاء</button>
  <button class="menu-btn" onclick="showPopup('register')">✏️ تسجيل جديد</button>
</div>

<!-- ===== LOGIN POPUP ===== -->
<div class="popup" id="loginPopup">
  <div class="popup-box">
    <span class="close-popup" onclick="closePopup('login')">&times;</span>
    <h3>👤 دخول الأعضاء</h3>
    <input type="text" id="loginName" placeholder="اسم المستخدم">
    <input type="password" id="loginPass" placeholder="كلمة المرور">
    <button class="btn-main" onclick="memberLogin()">دخول</button>
  </div>
</div>

<!-- ===== REGISTER POPUP ===== -->
<div class="popup" id="registerPopup">
  <div class="popup-box">
    <span class="close-popup" onclick="closePopup('register')">&times;</span>
    <h3>✏️ انشاء حساب جديد</h3>
    <input type="text" id="regName" placeholder="اسم المستخدم">
    <input type="password" id="regPass" placeholder="كلمة المرور">
    <input type="password" id="regPass2" placeholder="تأكيد كلمة المرور">
    <div class="input-group">
      <div class="gender-dropdown">
        <div class="gender-btn" onclick="toggleGender('reg')">الجنس</div>
        <div class="gender-options" id="regGenderOptions">
          <div class="gender-option" onclick="setGender('reg', 'male')">ذكر</div>
          <div class="gender-option" onclick="setGender('reg', 'female')">أنثى</div>
          <div class="gender-option" onclick="setGender('reg', 'other')">آخر</div>
        </div>
      </div>
    </div>
    <button class="btn-main" onclick="register()">انشاء حساب</button>
  </div>
</div>

<!-- ===== GUEST LOGIN POPUP ===== -->
<div class="popup" id="guestPopup">
  <div class="popup-box">
    <span class="close-popup" onclick="closePopup('guest')">&times;</span>
    <h3>🤖 دخول زائر</h3>
    <input type="text" id="guestName" placeholder="الاسم المستعار">
    <div class="input-group">
      <div class="gender-dropdown">
        <div class="gender-btn" onclick="toggleGender('guest')">الجنس</div>
        <div class="gender-options" id="guestGenderOptions">
          <div class="gender-option" onclick="setGender('guest', 'male')">ذكر</div>
          <div class="gender-option" onclick="setGender('guest', 'female')">أنثى</div>
          <div class="gender-option" onclick="setGender('guest', 'other')">آخر</div>
        </div>
      </div>
    </div>
    <button class="btn-main" onclick="guestLogin()">دخول</button>
  </div>
</div>

<!-- ===== CHAT INTERFACE ===== -->
<div id="chatArea">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="left">
      <button onclick="toggleSidebar('rooms')"><i class="fas fa-bars"></i></button>
      <div class="room-name" id="roomName">الغرفة الرئيسية</div>
    </div>
    <div class="online-count" id="onlineCount">0 متصل</div>
    <div class="right">
      <button onclick="toggleSidebar('users')"><i class="fas fa-users"></i></button>
      <button onclick="openProfile()"><i class="fas fa-user-circle"></i></button>
      <button onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>

  <!-- CHAT BODY -->
  <div class="chat-body">
    <div id="messages"></div>
  </div>

  <!-- INPUT AREA -->
  <div class="input-area">
    <button onclick="uploadFile()"><i class="fas fa-plus"></i></button>
    <button onclick="toggleEmoji()"><i class="fas fa-smile"></i></button>
    <input type="text" id="msgInput" placeholder="اكتب رسالتك هنا..." autocomplete="off">
    <button onclick="recordVoice()"><i class="fas fa-microphone"></i></button>
    <button id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottombar">
    <button onclick="toggleSidebar('rooms')"><i class="fas fa-home"></i> الغرف</button>
    <button onclick="toggleSidebar('users')"><i class="fas fa-users"></i> المتواجدين</button>
    <button onclick="toggleSidebar('news')"><i class="fas fa-newspaper"></i> الأخبار</button>
    <button onclick="openProfile()"><i class="fas fa-user"></i> الملف</button>
  </div>
</div>

<!-- ===== SIDEBARS ===== -->
<div class="sidebar" id="roomsSidebar">
  <div class="sidebar-header">
    <h3>الغرف</h3>
    <button class="close" onclick="toggleSidebar('rooms')">&times;</button>
  </div>
  <div class="rooms-list" id="roomsList"></div>
</div>

<div class="sidebar" id="usersSidebar">
  <div class="sidebar-header">
    <h3>المتواجدين</h3>
    <button class="close" onclick="toggleSidebar('users')">&times;</button>
  </div>
  <div class="users-list" id="usersList"></div>
</div>

<div class="sidebar" id="newsSidebar">
  <div class="sidebar-header">
    <h3>الأخبار</h3>
    <button class="close" onclick="toggleSidebar('news')">&times;</button>
  </div>
  <div id="newsList" style="display:flex;flex-direction:column;gap:10px;"></div>
</div>

<!-- ===== PROFILE MODAL ===== -->
<div class="profile-modal" id="profileModal">
  <div class="profile-box">
    <div class="profile-cover">
      <img id="profileCover" src="https://via.placeholder.com/500x150/075e54/075e54" alt="Cover">
      <div class="profile-avatar">
        <img id="profileAvatar" src="https://via.placeholder.com/80/075e54/075e54" alt="Avatar">
      </div>
    </div>

    <div class="profile-header">
      <div class="profile-name" id="profileNameLabel">المستخدم</div>
      <div class="profile-rank" id="profileRankLabel">الرتبة</div>
    </div>

    <div class="profile-tabs">
      <div class="profile-tab active" onclick="switchTab('info')">المعلومات</div>
      <div class="profile-tab" onclick="switchTab('settings')">الإعدادات</div>
      <div class="profile-tab" onclick="switchTab('friends')">الأصدقاء</div>
    </div>

    <div class="profile-content active" id="tabInfo">
      <div class="profile-info-row">
        <span class="profile-info-label">الرصيد 💲</span>
        <span class="profile-info-value" id="creditValue">0</span>
      </div>
      <div class="profile-info-row">
        <span class="profile-info-label">الجنس</span>
        <span class="profile-info-value" id="genderValue">ذكر</span>
      </div>
      <div class="profile-info-row">
        <span class="profile-info-label">الدول</span>
        <span class="profile-info-value" id="countryValue">اليمن</span>
      </div>
      <div class="profile-info-row">
        <span class="profile-info-label">الحالة</span>
        <span class="profile-info-value" id="statusValue">متصل ✅</span>
      </div>
    </div>

    <div class="profile-content" id="tabSettings">
      <h4 style="margin-bottom:15px;">تحديث بيانات الملف</h4>
      <textarea id="profileBio" placeholder="النبذة الشخصية" style="resize:vertical;min-height:80px;"></textarea>
      <input type="text" id="profileStatus" placeholder="رسالة الحالة">
      <button class="btn-main" onclick="updateProfile()">حفظ التغييرات</button>
    </div>

    <div class="profile-content" id="tabFriends">
      <div id="friendsList" style="display:flex;flex-direction:column;gap:10px;"></div>
      <button class="btn-main" onclick="addFriendDialog()" style="margin-top:15px;">إضافة صديق</button>
    </div>

    <div class="profile-actions">
      <button class="btn-secondary" onclick="closeProfile()">إغلاق</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let me = { name: '', rank: 'guest', credits: 0 };
  let currentRoom = 'main';
  let genderSelected = { guest: 'male', reg: 'male', login: 'male' };

  // ===== UI FUNCTIONS =====
  function showPopup(type) {
    document.getElementById(type + 'Popup').classList.add('show');
  }

  function closePopup(type) {
    document.getElementById(type + 'Popup').classList.remove('show');
  }

  function toggleGender(type) {
    document.getElementById(type + 'GenderOptions').classList.toggle('show');
  }

  function setGender(type, gender) {
    genderSelected[type] = gender;
    document.getElementById(type + 'GenderBtn').innerText = 
      gender === 'male' ? 'ذكر' : gender === 'female' ? 'أنثى' : 'آخر';
    toggleGender(type);
  }

  function toggleSidebar(type) {
    const sidebar = document.getElementById(type + 'Sidebar');
    if (sidebar) {
      sidebar.classList.toggle('open');
    }
  }

  function openProfile() {
    document.getElementById('profileModal').classList.add('show');
    updateProfileDisplay();
  }

  function closeProfile() {
    document.getElementById('profileModal').classList.remove('show');
  }

  function switchTab(tab) {
    document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.profile-content').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  }

  // ===== AUTH FUNCTIONS =====
  function guestLogin() {
    const name = document.getElementById('guestName').value.trim();
    if (!name) {
      alert('أدخل اسم');
      return;
    }
    socket.emit('guest', { name, gender: genderSelected.guest });
    closePopup('guest');
  }

  function memberLogin() {
    const name = document.getElementById('loginName').value.trim();
    const password = document.getElementById('loginPass').value;
    if (!name || !password) {
      alert('أدخل البيانات');
      return;
    }
    socket.emit('login', { name, password });
    closePopup('login');
  }

  function register() {
    const name = document.getElementById('regName').value.trim();
    const pass = document.getElementById('regPass').value;
    const pass2 = document.getElementById('regPass2').value;

    if (!name || !pass || !pass2) {
      alert('أدخل البيانات');
      return;
    }
    if (pass !== pass2) {
      alert('كلمات المرور غير متطابقة');
      return;
    }
    socket.emit('register', { name, password: pass, gender: genderSelected.reg });
    closePopup('register');
  }

  function logout() {
    socket.disconnect();
    location.reload();
  }

  // ===== SOCKET EVENTS =====
  socket.on('login_ok', (user) => {
    me = user;
    document.getElementById('mainMenu').classList.add('hide');
    document.getElementById('chatArea').classList.add('show');
    
    // Join main room
    socket.emit('join', { room: currentRoom });
    
    // Load rooms
    loadRooms();
  });

  socket.on('error_msg', (msg) => {
    alert('⚠️ ' + msg);
  });

  socket.on('register_ok', (msg) => {
    alert('✅ ' + msg);
  });

  socket.on('chat_message', (data) => {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg';
    msgDiv.innerHTML = `
      <div class="avatar">${data.from.charAt(0)}</div>
      <div class="msg-content">
        <div class="msg-header">
          <div class="msg-time">${data.time}</div>
          <div>
            <span class="msg-name">${data.from}</span>
            <span class="msg-rank">${getRankEmoji(data.rank)} ${data.rank}</span>
          </div>
        </div>
        <div class="msg-text">${escapeHtml(data.content)}</div>
      </div>
    `;
    document.getElementById('messages').appendChild(msgDiv);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  });

  socket.on('system_message', (data) => {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'system-msg';
    msgDiv.textContent = data.content;
    document.getElementById('messages').appendChild(msgDiv);
  });

  socket.on('users_list', (users) => {
    const usersList = document.getElementById('usersList');
    usersList.innerHTML = '';
    
    users.forEach(user => {
      const userDiv = document.createElement('div');
      userDiv.className = 'user-item';
      userDiv.onclick = () => viewUserProfile(user.name);
      userDiv.innerHTML = `
        <div class="user-status" style="background:${user.online ? '#4caf50' : '#999'}"></div>
        <div class="user-info">
          <div class="user-name">${user.name}</div>
          <div class="user-rank">${getRankEmoji(user.rank)} ${user.rank}</div>
        </div>
      `;
      usersList.appendChild(userDiv);
    });

    document.getElementById('onlineCount').textContent = users.filter(u => u.online).length + ' متصل';
  });

  socket.on('private_opened', (data) => {
    console.log('Chat opened with:', data.with);
  });

  socket.on('private_history', (messages) => {
    console.log('Private messages loaded:', messages.length);
  });

  // ===== MESSAGE FUNCTIONS =====
  function sendMessage() {
    const input = document.getElementById('msgInput');
    const content = input.value.trim();
    
    if (!content) return;
    
    socket.emit('chat_message', { room: currentRoom, content });
    input.value = '';
    input.focus();
  }

  function uploadFile() {
    alert('سيتم إضافة رفع الملفات قريباً 📁');
  }

  function recordVoice() {
    alert('سيتم إضافة تسجيل الصوت قريباً 🎙️');
  }

  function toggleEmoji() {
    alert('سيتم إضافة قائمة الإيموجي قريباً 😊');
  }

  // ===== ROOM FUNCTIONS =====
  function loadRooms() {
    const roomsList = document.getElementById('roomsList');
    roomsList.innerHTML = `
      <div class="room-item active" onclick="joinRoom('main')"><i class="fas fa-home"></i> <span class="room-item-name">الغرفة الرئيسية</span></div>
      <div class="room-item" onclick="joinRoom('yemen')"><i class="fas fa-flag"></i> <span class="room-item-name">غرفة اليمن</span></div>
      <div class="room-item" onclick="joinRoom('saudi')"><i class="fas fa-flag"></i> <span class="room-item-name">غرفة السعودية</span></div>
      <div class="room-item" onclick="joinRoom('egypt')"><i class="fas fa-flag"></i> <span class="room-item-name">غرفة مصر</span></div>
    `;
  }

  function joinRoom(roomName) {
    currentRoom = roomName;
    socket.emit('join', { room: roomName });
    
    document.getElementById('roomName').textContent = roomName;
    document.getElementById('messages').innerHTML = '';
    
    document.querySelectorAll('.room-item').forEach(item => item.classList.remove('active'));
    event.target.closest('.room-item').classList.add('active');
    
    toggleSidebar('rooms');
  }

  // ===== PROFILE FUNCTIONS =====
  function updateProfileDisplay() {
    document.getElementById('profileNameLabel').textContent = me.name;
    document.getElementById('profileRankLabel').textContent = (getRankEmoji(me.rank) || '👤') + ' ' + me.rank;
    document.getElementById('creditValue').textContent = me.credits || 0;
  }

  function updateProfile() {
    const bio = document.getElementById('profileBio').value;
    const status = document.getElementById('profileStatus').value;
    socket.emit('update_profile', { bio, status });
  }

  function viewUserProfile(userName) {
    socket.emit('get_user_profile', userName);
  }

  function addFriendDialog() {
    const name = prompt('أدخل اسم الصديق:');
    if (name) socket.emit('add_friend', name);
  }

  // ===== HELPER FUNCTIONS =====
  function getRankEmoji(rank) {
    const emojis = {
      'guest': '🤖',
      'member': '👤',
      'premium': '💎',
      'moderator': '🛡️',
      'admin': '☆',
      'superadmin': '⭐',
      'owner': '👑'
    };
    return emojis[rank] || '👤';
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ===== KEYBOARD EVENTS =====
  document.getElementById('msgInput')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  // Auto scroll on load
  window.addEventListener('load', () => {
    const messagesDiv = document.getElementById('messages');
    if (messagesDiv) {
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  });
</script>

</body>
</html>
