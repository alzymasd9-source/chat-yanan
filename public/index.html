<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>شات اليمن المطور</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Tajawal",tahoma}
body{background:#f2f2f2}

/* الهيدر العلوي */
.topbar{background:#0f414e;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:10px;position:fixed;top:0;width:100%;z-index:100;height:50px}
.topbar .left{display:flex;gap:18px;font-size:20px;align-items:center}
.topbar .left i{cursor:pointer}
.topbar .right{display:flex;align-items:center;gap:10px}
.topbar .avatar{width:35px;height:35px;border-radius:50%;background:#ccc}

/* منطقة الشات */
.chat-area{padding:60px 0 120px 0;min-height:100vh;background:#e5ddd5}
.msg-row{display:flex;margin:8px 10px;align-items:flex-start}
.msg{max-width:80%;background:#fff;padding:8px 12px;border-radius:8px;box-shadow:0 1px 1px rgba(0,0,0,.1)}
.msg.me{background:#dcf8c6;margin-right:auto}
.msg .name{font-size:13px;font-weight:700;color:#0f414e;margin-bottom:2px}
.msg .content{font-size:15px;line-height:1.5}
.msg .time{font-size:11px;color:#667781;text-align:left;margin-top:3px}
.avatar{width:40px;height:40px;border-radius:50%;background:#74b20e;color:#fff;display:grid;place-items:center;font-weight:700;margin:0 5px;font-size:15px;flex-shrink:0}
.msg-time{font-size:11px;color:#999;text-align:center;margin:10px}

/* شريط الارسال */
.input-bar{position:fixed;bottom:50px;width:100%;background:#f0f0f0;display:flex;align-items:center;padding:8px;gap:8px;border-top:1px solid #ddd}
.input-bar input{flex:1;padding:10px 15px;border-radius:25px;border:none;outline:none;font-size:16px;background:#fff}
.input-bar .btn{width:40px;height:40px;border-radius:50%;background:transparent;color:#54656f;border:none;font-size:22px;display:grid;place-items:center;cursor:pointer}
#sendBtn{background:#0f414e;color:#fff}

/* الشريط السفلي */
.bottom-nav{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-around;padding:8px 0;border-top:1px solid #ddd;height:50px}
.bottom-nav div{text-align:center;font-size:11px;color:#54656f;cursor:pointer}
.bottom-nav i{font-size:22px;display:block;margin-bottom:2px}
.bottom-nav .active{color:#0f414e}

/* شاشة الدخول */
#login_page{background:#0f414e;min-height:100vh;color:#fff;text-align:center;padding-top:80px}
#login_page h1{font-size:28px;margin-bottom:30px}
.login-box{background:#fff;color:#000;width:90%;max-width:350px;margin:auto;padding:20px;border-radius:15px}
.login-box input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:18px;text-align:center}
.login-box button{width:100%;padding:12px;background:#74b20e;color:#fff;border:none;border-radius:8px;font-size:18px;margin-top:10px;cursor:pointer}
.gendiv{display:flex;justify-content:space-around;margin:10px 0}
#chat_app{display:none}
</style>
</head>
<body>

<div id="login_page">
  <h1>شات اليمن المطور</h1>
  <div class="login-box" id="guest_box">
    <h3>دخول الزوار</h3>
    <input type="text" id="guest_username" placeholder="الإسم المستعار">
    <div class="gendiv">
      <label><input type="radio" name="g" value="male" checked> ذكر</label>
      <label><input type="radio" name="g" value="female"> أنثى</label>
    </div>
    <button id="guest_btn">دخول</button>
    <button onclick="showMember()" style="background:#0f414e">دخول الاعضاء</button>
  </div>
  
  <div class="login-box" id="member_box" style="display:none">
    <h3>دخول الاعضاء</h3>
    <input type="text" id="member_username" placeholder="الإسم المستعار">
    <input type="password" id="member_password" placeholder="كلمة المرور">
    <button id="member_btn">دخول</button>
    <button onclick="register()">تسجيل جديد</button>
    <button onclick="showGuest()" style="background:#ccc;color:#000">رجوع</button>
  </div>
</div>

<div id="chat_app">
  <div class="topbar">
    <i class="fa fa-bars"></i>
    <div class="left">
      <i class="fa fa-store"></i>
      <i class="fa fa-envelope"></i>
      <i class="fa fa-user-plus"></i>
      <i class="fa fa-heart"></i>
    </div>
    <div class="right">
      <div class="avatar"></div>
    </div>
  </div>

  <div class="chat-area" id="messages_box">
    <div class="msg-time">اليوم</div>
  </div>

  <form class="input-bar" id="chat_form">
    <button type="button" class="btn"><i class="fa fa-plus"></i></button>
    <button type="button" class="btn"><i class="fa fa-smile"></i></button>
    <input type="text" id="msg_input" placeholder="اكتب هنا...">
    <button type="button" class="btn"><i class="fa fa-microphone"></i></button>
    <button type="submit" class="btn" id="sendBtn"><i class="fa fa-paper-plane"></i></button>
  </form>

  <div class="bottom-nav">
    <div><i class="fa fa-volume-up"></i>مذيعة</div>
    <div><i class="fa fa-user"></i>اعضاء</div>
    <div class="active"><i class="fa fa-home"></i>الغرف</div>
    <div><i class="fa fa-cog"></i>خيارات</div>
    <div><i class="fa fa-user-circle"></i>الملف</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io("https://chat-yanan-1.onrender.com");
const $ = id => document.getElementById(id);
let me = {};

function showMember(){ $('guest_box').style.display='none'; $('member_box').style.display='block'; }
function showGuest(){ $('member_box').style.display='none'; $('guest_box').style.display='block'; }

$('guest_btn').onclick = () => {
  let name = $('guest_username').value;
  if(name) socket.emit('guest',{name});
}
$('member_btn').onclick = () => {
  socket.emit('login',{name:$('member_username').value,password:$('member_password').value});
}
function register(){ socket.emit('register',{name:$('member_username').value,password:$('member_password').value,gender:'male'}); }

socket.on('login_ok',u=>{
  me=u;
  $('login_page').style.display='none';
  $('chat_app').style.display='block';
  socket.emit('join',{name:u.name,room:'main'});
});

socket.on('chat_message',d=>{
  let isMe = d.from == me.name;
  $('messages_box').innerHTML += `
  <div class="msg-row">
    ${!isMe ? `<div class="avatar">${d.from.charAt(0)}</div>` : ''}
    <div class="msg ${isMe?'me':''}">
      <div class="name">${d.rank? '['+d.rank+'] ':''}${d.from}</div>
      <div class="content">${d.content}</div>
      <div class="time">${d.time}</div>
    </div>
  </div>`;
  $('messages_box').scrollTop = $('messages_box').scrollHeight;
});

$('chat_form').onsubmit = e => { 
  e.preventDefault(); 
  if($('msg_input').value.trim()=='')return; 
  socket.emit('chat_message',{room:'main',content:$('msg_input').value}); 
  $('msg_input').value=''; 
};
</script>
</body>
</html>
