<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>شات اليمن العربي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Tajawal",tahoma}
body{background:#fff}

/* الشريط العلوي */
.topbar{background:#0f3d4a;color:#fff;display:flex;justify-content:center;align-items:center;position:fixed;top:0;width:100%;z-index:100;height:45px;font-size:15px}

/* منطقة الشات */
.chat-area{padding:55px 10px 120px 10px;min-height:100vh;background:#fff}
.msg-row{display:flex;margin:15px 0;align-items:flex-start;justify-content:space-between;gap:10px}
.msg{flex:1;text-align:right}
.msg.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.msg.name{font-size:15px;font-weight:700;color:#0066ff}
.msg.name span{font-weight:400;color:#666;font-size:14px}
.msg.time{font-size:12px;color:#999}
.msg.content{font-size:16px;color:#000}
.avatar{width:50px;height:50px;border-radius:50%;background:#5cb85c;color:#fff;display:grid;place-items:center;font-weight:700;font-size:16px;flex-shrink:0}

/* شريط الارسال */
.input-bar{position:fixed;bottom:50px;width:100%;background:#f5f5f5;display:flex;align-items:center;padding:10px;gap:10px;border-top:1px solid #ddd}
.input-bar input{flex:1;padding:12px 20px;border-radius:30px;border:1px solid #ccc;outline:none;font-size:16px;background:#fff;text-align:right}
.input-bar.btn{width:45px;height:45px;border-radius:50%;background:#0f3d4a;color:#fff;border:none;font-size:20px;display:grid;place-items:center;cursor:pointer}

/* الشريط السفلي */
.bottom-nav{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-around;padding:8px 0;border-top:1px solid #ddd;height:50px}
.bottom-nav div{text-align:center;font-size:13px;color:#666;cursor:pointer}
.bottom-nav i{font-size:20px;display:block;margin-bottom:2px}
.bottom-nav.active{color:#0f3d4a;font-weight:700}

/* شاشة الدخول */
#login_page{background:#0f3d4a;min-height:100vh;color:#fff;text-align:center;padding-top:100px}
#login_page h1{font-size:26px;margin-bottom:30px}
.login-box{background:#fff;color:#000;width:90%;max-width:340px;margin:auto;padding:20px;border-radius:10px}
.login-box input{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:5px;font-size:16px;text-align:center}
.login-box button{width:100%;padding:12px;background:#5cb85c;color:#fff;border:none;border-radius:5px;font-size:18px;margin-top:10px;cursor:pointer}
.gendiv{display:flex;justify-content:space-around;margin:10px 0;color:#000}
#chat_app{display:none}
</style>
</head>
<body>

<div id="login_page">
  <h1>شات اليمن العربي</h1>
  <div class="login-box" id="guest_box">
    <h3>دخول الزوار</h3>
    <input type="text" id="guest_username" placeholder="الإسم المستعار">
    <div class="gendiv">
      <label><input type="radio" name="g" value="male" checked> ذكر</label>
      <label><input type="radio" name="g" value="female"> أنثى</label>
    </div>
    <button id="guest_btn">دخول</button>
    <button onclick="showMember()" style="background:#0f3d4a">دخول الاعضاء</button>
  </div>

  <div class="login-box" id="member_box" style="display:none">
    <h3>دخول الاعضاء</h3>
    <input type="text" id="member_username" placeholder="الإسم المستعار">
    <input type="password" id="member_password" placeholder="كلمة المرور">
    <button id="member_btn">دخول</button>
    <button onclick="register()">تسجيل جديد</button>
    <button onclick="showGuest()" style="background:#ccc;color:#000">رجوع</button>
  </div>
</div>

<div id="chat_app">
  <div class="topbar">Store</div>

  <div class="chat-area" id="messages_box"></div>

  <form class="input-bar" id="chat_form">
    <button type="button" class="btn"><i class="fa fa-ellipsis-v"></i></button>
    <input type="text" id="msg_input" placeholder="اكتب هنا...">
  </form>

  <div class="bottom-nav">
    <div><i class="fa fa-volume-up"></i>مذيعة</div>
    <div><i class="fa fa-users"></i>اعضاء</div>
    <div class="active"><i class="fa fa-home"></i>الغرف</div>
    <div><i class="fa fa-cog"></i>خيارات</div>
    <div><i class="fa fa-user"></i>الملف</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io("https://chat-yanan-1.onrender.com");
const $ = id => document.getElementById(id);
let me = {};

function showMember(){ $('guest_box').style.display='none'; $('member_box').style.display='block'; }
function showGuest(){ $('member_box').style.display='none'; $('guest_box').style.display='block'; }

$('guest_btn').onclick = () => {
  let name = $('guest_username').value.trim();
  if(name) socket.emit('guest',{name});
  else alert('ادخل اسم');
}
$('member_btn').onclick = () => {
  socket.emit('login',{name:$('member_username').value,password:$('member_password').value});
}
function register(){
  let name = $('member_username').value.trim();
  let pass = $('member_password').value.trim();
  if(name && pass) socket.emit('register',{name,password:pass,gender:'male'});
  else alert('ادخل البيانات');
}

socket.on('login_ok',u=>{
  me=u;
  $('login_page').style.display='none';
  $('chat_app').style.display='block';
  socket.emit('join',{name:u.name,room:'main'});
});

socket.on('error_msg',msg=>{ alert(msg); });

socket.on('chat_message',d=>{
  let rank = d.rank && d.rank!= 'عضو'? ` [${d.rank}]` : ' [guest]';
  $('messages_box').innerHTML += `
  <div class="msg-row">
    <div class="msg">
      <div class="header">
        <div class="name">${d.from}<span>${rank}</span></div>
        <div class="time">${d.time} م</div>
      </div>
      <div class="content">${d.content}</div>
    </div>
    <div class="avatar">${d.from.substring(0,2).toUpperCase()}</div>
  </div>`;
  $('messages_box').scrollTop = $('messages_box').scrollHeight;
});

$('chat_form').onsubmit = e => {
  e.preventDefault();
  if($('msg_input').value.trim()=='')return;
  socket.emit('chat_message',{room:'main',content:$('msg_input').value});
  $('msg_input').value='';
};
</script>
</body>
</html>
