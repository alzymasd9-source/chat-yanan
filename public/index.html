<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات اليمن المطور</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0A;--card:#1A1A1A;--text:#FFF;--primary:#FFD700;--secondary:#FFA500}
body.dark{--bg:#0A0A0A;--card:#1A1A1A;--text:#FFF} body.light{--bg:#F5F5F5;--card:#FFF;--text:#000}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:var(--bg);color:var(--text);transition:0.3s}
.page{display:none;padding:15px;height:100vh;overflow-y:auto}
.active{display:block}
.header{background:linear-gradient(90deg,var(--primary),var(--secondary));padding:12px;display:flex;justify-content:space-between;align-items:center;color:#000;font-weight:bold;position:sticky;top:0;z-index:10}
.card{background:var(--card);padding:15px;border-radius:12px;margin-bottom:10px}
.input{width:100%;padding:10px;border-radius:8px;border:1px solid #444;background:#222;color:#fff;margin:5px 0}
.btn{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(90deg,var(--primary),var(--secondary));color:#000;font-weight:bold;margin:5px 0;cursor:pointer}
.room{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--card);border-radius:10px;margin-bottom:8px}
.chat{flex:1;overflow-y:auto;padding:10px;height:calc(100vh - 160px)}
.msg{display:flex;gap:8px;margin:8px 0}
.avatar{width:35px;height:35px;border-radius:50%;background:#333}
.name{font-weight:bold}
.time{font-size:11px;color:#888}
.input-bar{display:flex;gap:5px;padding:10px;background:var(--card);position:sticky;bottom:0}
.icon-btn{background:none;border:none;color:var(--primary);font-size:20px;cursor:pointer}
.action-box{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:15px 15px 0 0;padding:15px;display:none;z-index:99}
.rank-visitor{color:#AAA}.rank-member{color:#4CAF50}.rank-vip{color:#FFD700}.rank-mod{color:#2196F3}.rank-admin{color:#FF5722}.rank-owner{color:#E91E63}
</style>
</head>
<body class="dark">

<!-- صفحة الدخول -->
<div id="loginPage" class="page active">
  <h2 style="text-align:center;color:var(--primary);margin:20px 0">شات اليمن المطور 🇾🇪</h2>
  <div class="card">
    <input class="input" id="loginName" placeholder="الاسم">
    <input class="input" id="loginPass" type="password" placeholder="كلمة السر">
    <button class="btn" onclick="login('member')">دخول عضو</button>
    <button class="btn" style="background:#444;color:#fff" onclick="login('visitor')">دخول زائر</button>
  </div>
</div>

<!-- صفحة الغرف -->
<div id="roomsPage" class="page">
  <div class="header"><span>قائمة الغرف</span><button class="icon-btn" onclick="logout()">🚪</button></div>
  <div id="roomsList"></div>
  <div class="card">
    <button class="btn" onclick="openNews()">📰 الأخبار</button>
    <button class="btn" onclick="goStore()">🛒 المتجر</button>
    <button class="btn" onclick="openFriendsWall()">👥 حائط الأصدقاء</button>
    <button class="btn" onclick="toggleTheme()">🌙 تبديل الثيم</button>
    <button id="adminBtn" class="btn" style="display:none;background:#FF5722" onclick="openAdmin()">⚙️ الإدارة</button>
  </div>
</div>

<!-- صفحة الشات -->
<div id="chatPage" class="page" style="display:flex;flex-direction:column">
  <div class="header"><button class="icon-btn" onclick="goRooms()">←</button><span id="roomName"></span></div>
  <div class="chat" id="chatBox"></div>
  <div class="input-bar">
    <button class="icon-btn" onclick="uploadImg()">+</button>
    <button class="icon-btn" onclick="sendYoutube()">▶️</button>
    <input id="msgInput" class="input" placeholder="اكتب هنا...">
    <button class="icon-btn" onclick="sendMsg()">✈️</button>
  </div>
</div>

<!-- الملف الشخصي -->
<div id="profilePage" class="page">
  <div class="header"><button class="icon-btn" onclick="goRooms()">←</button><span>الملف الشخصي</span></div>
  <div class="card"><h3 id="profileName"></h3><p id="profileRank"></p><p>الرصيد: <span id="profileCoins">0</span>💲</p><p>اللايكات: <span id="profileLikes">0</span>❤️</p></div>
</div>

<!-- المتجر -->
<div id="storePage" class="page">
  <div class="header"><button class="icon-btn" onclick="goRooms()">←</button><span>المتجر</span></div>
  <div id="storeList"></div>
</div>

<!-- الأخبار -->
<div id="newsPage" class="page">
  <div class="header"><button class="icon-btn" onclick="goRooms()">←</button><span>الأخبار</span></div>
  <div id="newsList"></div>
  <div id="newsAdmin" class="card" style="display:none"><input class="input" id="newsInput" placeholder="اكتب الخبر"><button class="btn" onclick="postNews()">نشر</button></div>
</div>

<!-- لوحة الإدارة -->
<div id="adminPanel" class="page">
  <div class="header"><button class="icon-btn" onclick="goRooms()">←</button><span>لوحة التحكم</span></div>
  <div id="logsBox" class="card"></div>
  <div class="card">
    <input class="input" id="targetUser" placeholder="اسم العضو">
    <button class="btn" onclick="muteUser(10)">كتم 10د</button>
  </div>
</div>

<script>
// عدلته لك - رابط السيرفر
const API = "https://chat-yanan-1.onrender.com";
const socket = io(API);
let currentUser={}, currentRoom='العامة';
const ranks={visitor:{emoji:"🤖",class:"rank-visitor"},member:{emoji:"👤",class:"rank-member"},vip:{emoji:"💎",class:"rank-vip"},mod:{emoji:"🛡️",class:"rank-mod"},admin:{emoji:"☆",class:"rank-admin"},owner:{emoji:"👑",class:"rank-owner"}};

window.onload=()=> document.body.className = localStorage.getItem('theme') || 'dark';
function toggleTheme(){let theme=document.body.classList.contains('dark')?'light':'dark';document.body.className=theme;localStorage.setItem('theme',theme);if(currentUser.name)fetch(API+'/user/update',{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:currentUser.name,theme})});}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active')}
async function login(rank){
  currentUser={name:document.getElementById('loginName').value,pass:document.getElementById('loginPass').value,rank};
  if(!currentUser.name) return alert("اكتب الاسم");
  let res=await fetch(API+'/login',{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(currentUser)});
  currentUser=await res.json();
  if(['admin','owner'].includes(currentUser.rank)) document.getElementById('adminBtn').style.display='block';
  goRooms();
}
function goRooms(){showPage('roomsPage');loadRooms();}
function enterRoom(room){currentRoom=room;socket.emit('joinRoom',room);showPage('chatPage');document.getElementById('roomName').innerText=room;document.getElementById('chatBox').innerHTML="";loadMsgs(room);}
function loadRooms(){document.getElementById('roomsList').innerHTML=['العامة','اليمن','مصر','الجزائر'].map(r=>`<div class="room"><span>${r}</span><button class="btn" style="width:auto;padding:8px 15px" onclick="enterRoom('${r}')">دخول</button></div>`).join('');}
socket.on('newMsg', (msg)=>{if(msg.room!=currentRoom)return;document.getElementById('chatBox').innerHTML+=`<div class="msg"><div class="avatar"></div><div><div class="name ${ranks[msg.senderRank]?.class}">${ranks[msg.senderRank]?.emoji} ${msg.sender}</div><div>${msg.text}</div></div></div>`;document.getElementById('chatBox').scrollTop=99999;});
socket.on('system', (txt)=>document.getElementById('chatBox').innerHTML+=`<div style="text-align:center;color:#888;font-size:12px;margin:5px 0">${txt}</div>`);
async function loadMsgs(room){let res=await fetch(API+`/msgs/${room}`);(await res.json()).forEach(m=>socket.emit('newMsg',m));}
function sendMsg(){let txt=document.getElementById('msgInput').value;if(!txt) return;socket.emit('sendMsg',{room:currentRoom,sender:currentUser.name,senderRank:currentUser.rank,text:txt});document.getElementById('msgInput').value="";}
function uploadImg(){let i=document.createElement('input');i.type='file';i.onchange=async e=>{let f=new FormData();f.append('file',e.target.files[0]);let r=await fetch(API+'/upload',{method:"POST",body:f});let d=await r.json();sendMsg(`<img src="${API+d.url}" style="max-width:200px;border-radius:10px">`)};i.click();}
function sendYoutube(){let url=prompt("الصق رابط يوتيوب");if(url)sendMsg(`<iframe src="${url.replace('watch?v=','embed/')}" width="200" height="120" frameborder="0"></iframe>`);}
async function openAdmin(){showPage('adminPanel');let res=await fetch(API+'/logs');document.getElementById('logsBox').innerHTML=(await res.json()).map(l=>`<div>${new Date(l.time).toLocaleString()} - ${l.admin} ${l.action} ${l.target}</div>`).join('')||"لا يوجد سجل";}
function muteUser(min){let name=document.getElementById('targetUser').value;if(!name)return;socket.emit('mute',{name,min,by:currentUser.name,reason:"مخالفة"});}
async function goStore(){showPage('storePage');let res=await fetch(API+'/store');document.getElementById('storeList').innerHTML=(await res.json()).map(i=>`<div class="card"><h3>شراء ${i.item}</h3><p>السعر: ${i.price}💲</p><button class="btn" onclick="buy('${i.item}')">شراء</button></div>`).join('')||"<div class='card'>المتجر فاضي</div>";}
async function openNews(){showPage('newsPage');let res=await fetch(API+'/news');document.getElementById('newsList').innerHTML=(await res.json()).map(n=>`<div class="card"><b>${n.admin}:</b> ${n.text}</div>`).join('')||"<div class='card'>لا يوجد اخبار</div>";if(['admin','owner'].includes(currentUser.rank))document.getElementById('newsAdmin').style.display='block';}
function postNews(){let txt=document.getElementById('newsInput').value;if(!txt)return;fetch(API+'/news',{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({admin:currentUser.name,rank:currentUser.rank,text:txt})});document.getElementById('newsInput').value="";}
socket.on('newNews',(t)=>alert("📢 خبر جديد: "+t));
async function openFriendsWall(){enterRoom('حائط الأصدقاء');let res=await fetch(API+`/friends-wall/${currentUser.name}`);document.getElementById('chatBox').innerHTML=(await res.json()).map(p=>`<div class="msg"><b>${p.sender}:</b> ${p.text}</div>`).join('')||"<div>لا يوجد منشورات من اصدقائك</div>";}
async function logout(){await fetch(API+'/logout',{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(currentUser)});location.reload();}
</script>
</body>
</html>
