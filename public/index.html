<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقع شات اليمن المطور</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0A;--card:#1A1A1A;--text:#FFF;--primary:#FFD700;--secondary:#FFA500}
body.dark{--bg:#0A0A0A;--card:#1A1A1A;--text:#FFF} body.light{--bg:#F5F5F5;--card:#FFF;--text:#000}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:var(--bg);color:var(--text);transition:0.3s}
.page{display:none;height:100vh;flex-direction:column}
.active{display:flex}
.header{background:linear-gradient(90deg,var(--primary),var(--secondary));padding:12px;display:flex;justify-content:space-between;align-items:center;color:#000;font-weight:bold}
.card{background:var(--card);padding:15px;border-radius:12px;margin:10px}
.input{width:100%;padding:10px;border-radius:8px;border:1px solid #444;background:#222;color:#fff;margin:5px 0}
.btn{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(90deg,var(--primary),var(--secondary));color:#000;font-weight:bold;margin:5px 0;cursor:pointer}
.btn2{background:#333;color:#fff}
.gender-btn{padding:8px 12px;border:2px solid #444;border-radius:8px;margin:5px;cursor:pointer;background:#222;color:#fff}
.gender-male.active{border-color:#2196F3}
.gender-female.active{border-color:#E91E63}
.gender-other.active{border-color:#fff}
.room{padding:15px;background:var(--card);border-radius:10px;margin:8px 0;text-align:center}
.room button{width:auto;padding:8px 20px;margin-top:8px}
.chat{flex:1;overflow-y:auto;padding:10px;background:#111}
.msg{display:flex;gap:8px;margin:8px 0;align-items:flex-start}
.avatar{width:40px;height:40px;border-radius:50%;border:2px solid #444}
.avatar.male{border-color:#2196F3}.avatar.female{border-color:#E91E63}.avatar.other{border-color:#fff}
.msg-content{background:var(--card);padding:8px 12px;border-radius:10px;flex:1}
.msg-name{font-weight:bold;font-size:14px}
.msg-text{font-size:14px;margin-top:3px}
.time{font-size:10px;color:#888}
.system{text-align:center;color:#888;font-size:12px;margin:5px 0}
.input-bar{display:flex;gap:5px;padding:10px;background:var(--card)}
.icon-btn{background:none;border:none;color:var(--primary);font-size:20px;cursor:pointer}
.users-list{position:fixed;right:0;top:0;bottom:0;width:280px;background:var(--card);transform:translateX(100%);transition:0.3s;z-index:99;overflow-y:auto}
.users-list.show{transform:translateX(0)}
.user-item{padding:10px;border-bottom:1px solid #333;cursor:pointer}
.rank-visitor{color:#AAA}.rank-member{color:#4CAF50}.rank-vip{color:#FFD700}.rank-mod{color:#2196F3}.rank-admin{color:#FF5722}.rank-owner{color:#E91E63}
</style>
</head>
<body class="dark">

<!-- صفحة الدخول الرئيسية -->
<div id="loginPage" class="page active">
  <h2 style="text-align:center;color:var(--primary);margin:20px 0">موقع شات اليمن المطور 🇾🇪</h2>

  <div class="card">
    <h3>1. دخول زوار 👤</h3>
    <input class="input" id="visitorName" placeholder="اكتب اسمك">
    <div>
      <button class="gender-btn gender-male" onclick="setGender('male')">ذكر</button>
      <button class="gender-btn gender-female" onclick="setGender('female')">أنثى</button>
      <button class="gender-btn gender-other" onclick="setGender('other')">آخر</button>
    </div>
    <button class="btn" onclick="loginVisitor()">دخول زائر</button>
  </div>

  <div class="card">
    <h3>2. دخول أعضاء</h3>
    <input class="input" id="loginName" placeholder="اسم المستخدم">
    <input class="input" id="loginPass" type="password" placeholder="كلمة السر">
    <button class="btn" onclick="loginMember()">دخول</button>
  </div>

  <div class="card">
    <h3>3. تسجيل عضوية جديدة</h3>
    <input class="input" id="regName" placeholder="الاسم">
    <input class="input" id="regPass" type="password" placeholder="كلمة السر">
    <input class="input" id="regEmail" placeholder="البريد يقبل الوهمي">
    <select class="input" id="regGender"><option value="male">ذكر</option><option value="female">أنثى</option><option value="other">آخر</option></select>
    <input class="input" id="regAge" type="number" placeholder="العمر">
    <button class="btn" onclick="register()">انشاء حساب</button>
  </div>
</div>

<!-- صفحة الغرف -->
<div id="roomsPage" class="page">
  <div class="header">
    <span>قائمة الغرف</span>
    <button class="icon-btn" onclick="logout()">🚪</button>
  </div>
  <div id="roomsList" style="padding:10px"></div>
</div>

<!-- صفحة الشات -->
<div id="chatPage" class="page">
  <div class="header">
    <button class="icon-btn" onclick="goRooms()">←</button>
    <span id="roomName"></span>
    <button class="icon-btn" onclick="toggleUsers()">👥</button>
  </div>
  <div class="chat" id="chatBox"></div>
  <div class="input-bar">
    <button class="icon-btn" id="uploadBtn" onclick="uploadImg()">+</button>
    <button class="icon-btn" id="youtubeBtn" onclick="sendYoutube()">▶️</button>
    <button class="icon-btn" onclick="recordVoice()">🎤</button>
    <input id="msgInput" class="input" placeholder="اكتب هنا...">
    <button class="icon-btn" onclick="sendMsg()">✈️</button>
  </div>
</div>

<!-- قائمة المتواجدين -->
<div id="usersList" class="users-list">
  <div class="header"><span>المتواجدين</span><button class="icon-btn" onclick="toggleUsers()">X</button></div>
  <div id="usersBox"></div>
</div>

<script>
const API = "https://chat-yanan-1.onrender.com";
const socket = io(API);
let currentUser={}, currentRoom='العامة', selectedGender='male';

const ranks={visitor:{emoji:"🤖",class:"rank-visitor"},member:{emoji:"👤",class:"rank-member"},vip:{emoji:"💎",class:"rank-vip"},mod:{emoji:"🛡️",class:"rank-mod"},admin:{emoji:"☆",class:"rank-admin"},owner:{emoji:"👑",class:"rank-owner"}};

function setGender(g){
  selectedGender=g;
  document.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.gender-'+g).classList.add('active');
}
function randomAge(){return Math.floor(Math.random()*80)+20;}

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active')}

async function loginVisitor(){
  let name=document.getElementById('visitorName').value;
  if(!name) return alert("اكتب اسمك");
  currentUser={name,rank:'visitor',gender:selectedGender,age:randomAge()};
  goRooms();
  socket.emit('join',currentUser);
}

async function loginMember(){
  let name=document.getElementById('loginName').value;
  let pass=document.getElementById('loginPass').value;
  let res=await fetch(API+'/login',{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,pass})});
  currentUser=await res.json();
  goRooms();
  socket.emit('join',currentUser);
}

async function register(){
  let data={name:document.getElementById('regName').value,pass:document.getElementById('regPass').value,email:document.getElementById('regEmail').value,gender:document.getElementById('regGender').value,age:document.getElementById('regAge').value,rank:'member'};
  let res=await fetch(API+'/register',{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
  currentUser=await res.json();
  goRooms();
  socket.emit('join',currentUser);
}

function goRooms(){showPage('roomsPage');loadRooms();}
function loadRooms(){
  let rooms=['العامة','اليمن','الجزائر','مصر'];
  document.getElementById('roomsList').innerHTML=rooms.map(r=>`
    <div class="room">
      <div>🌎 غرفة ${r} 🌎</div>
      <button class="btn" onclick="enterRoom('${r}')">اضغط هنا للدخول</button>
    </div>
  `).join('');
}

function enterRoom(room){
  currentRoom=room;
  socket.emit('joinRoom',room);
  showPage('chatPage');
  document.getElementById('roomName').innerText=room;
  document.getElementById('chatBox').innerHTML="";
  socket.emit('system',`انضم للغرفة ${currentUser.name} هلا وسهلا`);
  loadMsgs(room);
  updateButtons();
}

function updateButtons(){
  // الزائر والعضو ما يرفع صور ولا يوتيوب
  if(['visitor','member'].includes(currentUser.rank)){
    document.getElementById('uploadBtn').style.display='none';
    document.getElementById('youtubeBtn').style.display='none';
  } else {
    document.getElementById('uploadBtn').style.display='block';
    document.getElementById('youtubeBtn').style.display='block';
  }
}

socket.on('newMsg', (msg)=>{
  if(msg.room!=currentRoom) return;
  let time=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}) + ' ' + new Date().toLocaleDateString('ar-EG');
  let genderClass = msg.gender||'male';
  document.getElementById('chatBox').innerHTML+=`
  <div class="msg">
    <div class="avatar ${genderClass}"></div>
    <div class="msg-content">
      <div class="msg-name ${ranks[msg.senderRank]?.class}">${ranks[msg.senderRank]?.emoji} ${msg.sender}</div>
      <div class="msg-text">${msg.text}</div>
      <div class="time">${time}</div>
    </div>
  </div>`;
  document.getElementById('chatBox').scrollTop=99999;
});

socket.on('system', (txt)=>{
  document.getElementById('chatBox').innerHTML+=`<div class="system">[ ${txt} ]</div>`;
});

async function loadMsgs(room){
  let res=await fetch(API+`/msgs/${room}`);
  (await res.json()).forEach(m=>socket.emit('newMsg',m));
}

function sendMsg(){
  let txt=document.getElementById('msgInput').value;
  if(!txt) return;
  // دعم ***خط عريض***
  txt=txt.replace(/\*\*\*(.*?)\*\*\*/g,'<b>$1</b>');
  socket.emit('sendMsg',{room:currentRoom,sender:currentUser.name,senderRank:currentUser.rank,gender:currentUser.gender,text:txt});
  document.getElementById('msgInput').value="";
}

function uploadImg(){
  if(['visitor','member'].includes(currentUser.rank)) return alert("للمميز وما فوق فقط");
  let i=document.createElement('input');i.type='file';
  i.onchange=async e=>{let f=new FormData();f.append('file',e.target.files[0]);let r=await fetch(API+'/upload',{method:"POST",body:f});let d=await r.json();sendMsg(`<img src="${API+d.url}" style="max-width:200px;border-radius:10px">`)};
  i.click();
}
function sendYoutube(){
  if(['visitor','member'].includes(currentUser.rank)) return alert("للمميز وما فوق فقط");
  let url=prompt("الصق رابط يوتيوب");
  if(url)sendMsg(`<iframe src="${url.replace('watch?v=','embed/')}" width="200" height="120" frameborder="0"></iframe>`);
}
function recordVoice(){alert("التسجيل الصوتي شغال للكل");}
function toggleUsers(){document.getElementById('usersList').classList.toggle('show');}
async function logout(){await fetch(API+'/logout',{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(currentUser)});location.reload();}
</script>
</body>
</html>
