<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات اليمن المطور</title>
<style>
:root{--green:#075e54;--light:#dcf8c6}
*{box-sizing:border-box;font-family:tahoma}
body{margin:0;background:#e5ddd5;overflow:hidden}
.header{background:var(--green);color:#fff;padding:12px 15px;text-align:center;font-size:18px;font-weight:bold;position:fixed;width:100%;z-index:10}
#wrap{display:flex;height:100vh;padding-top:50px}
#sidebar{width:280px;background:#fff;border-left:1px solid #ddd;display:flex;flex-direction:column}
#users_list{flex:1;overflow:auto;padding:10px}
.user-item{display:flex;align-items:center;padding:8px;border-radius:8px;margin-bottom:5px}
.user-avatar{width:35px;height:35px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;margin-left:10px;font-weight:bold}
#chat_area{flex:1;display:flex;flex-direction:column}
#messages{flex:1;overflow:auto;padding:15px;background:#e5ddd5}
.msg{background:#fff;padding:8px 12px;border-radius:7px;margin:5px 0;max-width:70%;box-shadow:0 1px 1px rgba(0,0,0,0.1)}
.msg.me{background:var(--light);margin-right:auto}
.msg .name{font-weight:bold;color:var(--green);font-size:13px}
.msg .time{font-size:11px;color:#999;text-align:left;margin-top:3px}
#chat-input{padding:10px;background:#f0f0f0;display:flex;gap:10px}
#msg_input{flex:1;padding:10px;border:1px solid #ddd;border-radius:20px;outline:none}
.btn{background:var(--green);color:#fff;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;font-weight:bold}
.btn:active{opacity:0.8}
#roomid{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:999;display:flex;align-items:center;justify-content:center}
.login-box{text-align:center}
.login-box input{padding:12px;border-radius:10px;border:1px solid #ddd;width:250px;margin:10px 0;font-size:16px}
.hide{display:none}
@media(max-width:768px){#sidebar{position:absolute;z-index:5;height:calc(100% - 50px)}}
</style>
</head>
<body>
<div class="header">شات اليمن المطور</div>

<div id="wrap">
  <div id="sidebar">
    <div style="padding:10px;border-bottom:1px solid #ddd"><b>المتصلين</b> <span id="user_count">0</span></div>
    <div id="users_list"></div>
  </div>
  <div id="chat_area">
    <div id="messages"></div>
    <div id="chat-input">
      <input id="msg_input" placeholder="اكتب رسالتك..." autocomplete="off">
      <button class="btn" type="button" id="send_btn">ارسال</button>
    </div>
  </div>
</div>

<div id="roomid">
  <div class="login-box">
    <h3>أهلاً بك في شات اليمن المطور</h3>
    <input id="name_input" placeholder="اكتب اسمك" autocomplete="off">
    <br>
    <button class="btn" type="button" id="guest_btn">دخول</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const $ = id => document.getElementById(id);
const socket = io();
let myId = null;

// 1. زر الدخول
$('guest_btn').addEventListener('click', doJoin);
$('name_input').addEventListener('keypress', e => {if(e.key === 'Enter') doJoin();});

function doJoin(){
  const name = $('name_input').value.trim(); 
  if(!name){alert('الرجاء ادخال اسمك'); return;} 
  socket.emit('join', {name:name, gender:'male'}); 
  $('roomid').classList.add('hide');
}

// 2. زر الارسال
$('send_btn').addEventListener('click', sendMessage);
$('msg_input').addEventListener('keypress', e => {if(e.key === 'Enter'){e.preventDefault(); sendMessage();}});

function sendMessage(){
  let txt = $('msg_input').value.trim();
  if(!txt) return;
  socket.emit('message', {type:'text', content:txt}); 
  $('msg_input').value='';
}

// 3. استقبال الرسائل
socket.on('you are', d => {myId = d.id;});

socket.on('message', d => {
  const div = document.createElement('div');
  div.className = 'msg ' + (d.user.id === myId ? 'me' : '');
  div.innerHTML = `<div class="name">${d.user.name}</div>${d.content}<div class="time">${d.time}</div>`;
  $('messages').appendChild(div);
  $('messages').scrollTop = $('messages').scrollHeight;
});

// 4. قائمة المتصلين
socket.on('users list', list => {
  $('users_list').innerHTML = '';
  list.forEach(u => {
    $('users_list').innerHTML += `
      <div class="user-item">
        <div class="user-avatar">${u.name.charAt(0)}</div>
        <span>${u.name}</span>
      </div>`;
  });
  $('user_count').innerText = list.length;
});

socket.on('user joined', u => {
  const div = document.createElement('div');
  div.style.textAlign = 'center'; 
  div.style.color = '#999'; 
  div.style.fontSize = '12px';
  div.style.margin = '10px 0';
  div.innerText = `${u.name} دخل الشات`; 
  $('messages').appendChild(div);
});
</script>
</body>
</html>
